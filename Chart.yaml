apiVersion: v2
name: appwrite
description: Appwrite Helm chart
type: application
version: 1.3.1
appVersion: "1.9.0"
icon: https://appwrite.io/images/logos/appwrite.svg
dependencies:
  - name: mariadb
    version: 11.5.5
    repository: https://charts.bitnami.com/bitnami
    condition: mariadb.enabled
  - name: mongodb
    version: 15.1.2
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  - name: redis
    version: 17.9.0
    repository: https://charts.bitnami.com/bitnami
