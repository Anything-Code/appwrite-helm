---
kind: ConfigMap
apiVersion: v1
metadata:
  name: "{{ include "appwrite.fullname" $ }}-env"
  labels:
{{ include "appwrite.labels" $ | indent 4 }}
data:
  _APP_CONSOLE_WHITELIST_EMAILS: {{ include "array.join" .Values.appwrite.console.whitelist.emails }}
  _APP_CONSOLE_WHITELIST_IPS: {{ include "array.join" .Values.appwrite.console.whitelist.ips }}
  _APP_CONSOLE_WHITELIST_ROOT: {{ include "boolToStr" .Values.appwrite.console.whitelist.root }}
  _APP_CONSOLE_SESSION_ALERTS: {{ include "boolToStr" .Values.appwrite.console.sessionAlerts | default "disabled" }}
  _APP_CONSOLE_HOSTNAMES: {{ include "array.join" .Values.appwrite.console.hostnames | default "" }}
  _APP_DB_USER: {{ .Values.mariadb.auth.username }}
  _APP_DB_PORT: "3306"
  _APP_DB_SCHEMA: "appwrite"
  _APP_DB_HOST: {{ include "appwrite.fullname" . | printf "%s-mariadb" }}
  _APP_DOMAIN: {{ .Values.appwrite.domain | quote }}
  _APP_DOMAIN_TARGET: {{ .Values.appwrite.domain | quote }}
  _APP_ENV: {{ .Values.appwrite.env | quote }}
  _APP_FUNCTIONS_CONTAINERS: {{ .Values.functions.containers | quote }}
  _APP_FUNCTIONS_CPUS: {{ .Values.functions.cpus | quote }}
  _APP_FUNCTIONS_MEMORY: {{ .Values.functions.memory | quote }}
  _APP_FUNCTIONS_MEMORY_SWAP: {{ .Values.functions.swap | quote }}
  _APP_FUNCTIONS_RUNTIMES: {{ include "array.join" .Values.functions.runtimes }}
  _APP_FUNCTIONS_TIMEOUT: {{ .Values.functions.timeout | quote }}
  _APP_INFLUXDB_HOST: {{ .Values.influxdb.host | quote }}
  _APP_INFLUXDB_PORT: {{ .Values.influxdb.port | quote }}
  _APP_LOCALE: {{ .Values.appwrite.locale | quote }}
  _APP_OPTIONS_ABUSE: {{ include "boolToStr" .Values.appwrite.options.abuse }}
  _APP_OPTIONS_FORCE_HTTPS: {{ include "boolToStr" .Values.appwrite.options.forceHttps }}
  _APP_OPTIONS_ROUTER_PROTECTION: {{ include "boolToStr" .Values.appwrite.options.routerProtection | default "disabled" }}
  _APP_OPTIONS_ROUTER_FORCE_HTTPS: {{ include "boolToStr" .Values.appwrite.options.routerForceHttps | default "disabled" }}
  _APP_EMAIL_SECURITY: {{ include "boolToStr" .Values.appwrite.system.emailSecurity | default "disabled" }}
  _APP_SMS_FROM: {{ .Values.sms.from | quote }}
  _APP_SMS_PROVIDER: {{ .Values.sms.provider | quote }}
  _APP_SMTP_HOST: {{ .Values.smtp.host | quote }}
  _APP_SMTP_PORT: {{ .Values.smtp.port | quote }}
  _APP_SMTP_SECURE: {{ .Values.smtp.secure | quote }}
  _APP_STATSD_HOST: {{ include "appwrite.fullname" $ }}-telegraf
  _APP_STATSD_PORT: "8125"
  _APP_STORAGE_DEVICE: {{ .Values.storage.device | lower | quote }}
  _APP_STORAGE_LIMIT: {{ include "si.toNum" .Values.storage.uploadLimit }}
  _APP_STORAGE_PREVIEW_LIMIT: {{ .Values.storage.previewLimit | default "20000000" | quote }}
  _APP_STORAGE_ANTIVIRUS: {{ include "boolToStr" .Values.clamav.enabled }}
  _APP_STORAGE_ANTIVIRUS_HOST: {{ include "appwrite.fullname" $ }}-clamav
  _APP_STORAGE_ANTIVIRUS_PORT: "3310"
  {{- if ne (lower .Values.storage.device) "local" }}
  {{ printf "_APP_STORAGE_%s_ACCESS_KEY" .Values.storage.device | upper }}: {{ .Values.storage.bucket.accessKey | quote }}
  {{ printf "_APP_STORAGE_%s_BUCKET"     .Values.storage.device | upper }}: {{ .Values.storage.bucket.name | quote }}
  {{ printf "_APP_STORAGE_%s_REGION"     .Values.storage.device | upper }}: {{ .Values.storage.bucket.region | quote }}
  {{- if .Values.storage.bucket.endpoint }}
  {{ printf "_APP_STORAGE_%s_ENDPOINT"   .Values.storage.device | upper }}: {{ .Values.storage.bucket.endpoint | quote }}
  {{- end }}
  {{- end }}
  _APP_COMPRESSION_MIN_SIZE_BYTES: {{ .Values.appwrite.compressionMinSizeBytes | default "1024" | quote }}
  _APP_SYSTEM_EMAIL_NAME: {{ .Values.appwrite.system.email.name | quote }}
  _APP_SYSTEM_EMAIL_ADDRESS: {{ .Values.appwrite.system.email.addr | quote }}
  _APP_SYSTEM_RESPONSE_FORMAT: {{ .Values.appwrite.system.responseFormat | default "" | quote }}
  _APP_SYSTEM_SECURITY_EMAIL_ADDRESS: {{ .Values.appwrite.system.securityAddress | quote }}
  _APP_USAGE_STATS: {{ include "boolToStr" .Values.appwrite.usageStats.enabled }}
  _APP_USAGE_AGGREGATION_INTERVAL: {{ .Values.appwrite.usageStats.interval | quote }}
  _APP_LOGGING_CONFIG: {{ .Values.appwrite.loggingConfig | default "" | quote }}
  _APP_GRAPHQL_MAX_BATCH_SIZE: {{ .Values.appwrite.graphql.maxBatchSize | default "10" | quote }}
  _APP_GRAPHQL_MAX_COMPLEXITY: {{ .Values.appwrite.graphql.maxComplexity | default "250" | quote }}
  _APP_GRAPHQL_MAX_DEPTH: {{ .Values.appwrite.graphql.maxDepth | default "3" | quote }}
  # Maintenance settings
  _APP_MAINTENANCE_INTERVAL: {{ .Values.maintenance.interval | default "86400" | quote }}
  _APP_MAINTENANCE_DELAY: {{ .Values.maintenance.delay | default "0" | quote }}
  _APP_MAINTENANCE_RETENTION_EXECUTION: {{ .Values.maintenance.retention.execution | default "1209600" | quote }}
  _APP_MAINTENANCE_RETENTION_CACHE: {{ .Values.maintenance.retention.cache | default "2592000" | quote }}
  _APP_MAINTENANCE_RETENTION_ABUSE: {{ .Values.maintenance.retention.abuse | default "86400" | quote }}
  _APP_MAINTENANCE_RETENTION_AUDIT: {{ .Values.maintenance.retention.audit | default "1209600" | quote }}
  _APP_MAINTENANCE_RETENTION_AUDIT_CONSOLE: {{ .Values.maintenance.retention.auditConsole | default "1209600" | quote }}
  _APP_MAINTENANCE_RETENTION_USAGE_HOURLY: {{ .Values.maintenance.retention.usageHourly | default "8640000" | quote }}
  _APP_MAINTENANCE_RETENTION_SCHEDULES: {{ .Values.maintenance.retention.schedules | default "86400" | quote }}
  {{- if .Values.executor.enabled }}
  _APP_EXECUTOR_HOST: "http://{{ include "appwrite.fullname" $ }}-executor"
  _APP_COMPUTE_CPUS: {{ .Values.functions.cpus | quote }}
  _APP_COMPUTE_MEMORY: {{ .Values.functions.memory | quote }}
  _APP_COMPUTE_BUILD_TIMEOUT: {{ .Values.functions.timeout | quote }}
  _APP_COMPUTE_SIZE_LIMIT: "30000000"
  {{- end }}
  # Domain settings - must be set (empty string causes str_ends_with to always match)
  # Use "disabled" as placeholder to avoid null issues while not matching any real domain
  _APP_DOMAIN_FUNCTIONS: {{ .Values.functions.domain | default "disabled" | quote }}
  _APP_DOMAIN_SITES: {{ .Values.sites.domain | default "disabled" | quote }}
  _APP_SITES_TIMEOUT: {{ .Values.sites.timeout | default "900" | quote }}
  _APP_SITES_RUNTIMES: {{ include "array.join" .Values.sites.runtimes }}
  _APP_DOMAIN_TARGET_CNAME: {{ .Values.appwrite.domain | quote }}
  _APP_DOMAIN_TARGET_A: ""
  _APP_DOMAIN_TARGET_AAAA: ""
  _APP_DOMAIN_TARGET_CAA: ""
  _APP_DNS: ""
  # Disable internal certificate issuance - use ingress controller for TLS instead
  _APP_EMAIL_CERTIFICATES: "disabled"
