{{- if and .Values.console.enabled .Values.console.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appwrite.fullname" $ }}-console
  labels:
{{ include "appwrite.labels" $ | indent 4 }}
{{- if .Values.console.ingress.annotations }}
  annotations:
{{- toYaml .Values.console.ingress.annotations | nindent 4 }}
{{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.appwrite.domain }}
      http:
        paths:
          - path: /console
            pathType: Prefix
            backend:
              service:
                name: {{ include "appwrite.fullname" $ }}-console
                port:
                  number: 80
  {{- if .Values.console.ingress.tls.enabled }}
  tls:
    - hosts:
      - {{ .Values.appwrite.domain }}
      secretName: {{ include "appwrite.fullname" $ }}-tls
  {{- end -}}
{{- end -}}
