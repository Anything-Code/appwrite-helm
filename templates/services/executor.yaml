{{- if .Values.executor.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "appwrite.fullname" $ }}-executor"
  labels:
{{ include "appwrite.labels" $ | indent 4 }}
    app.kubernetes.io/component: executor
spec:
  # Route traffic to the executor pod on the SAME node as the caller.
  # This is critical because builds/functions/sites storage uses hostPath,
  # so the source files only exist on the node where the worker wrote them.
  internalTrafficPolicy: Local
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
{{ include "appwrite.selectorLabels" $ | indent 4 }}
    app.kubernetes.io/component: executor
{{- end }}
