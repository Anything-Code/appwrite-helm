---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ include "appwrite.fullname" $ }}-env"
  labels:
{{ include "appwrite.labels" $ | indent 4 }}
type: Opaque
data:
  _APP_OPENSSL_KEY_V1: {{ .Values.appwrite.sslKey | b64enc }}
  {{- if ne (lower .Values.storage.device) "local" }}
  {{ printf "_APP_STORAGE_%s_SECRET" .Values.storage.device | upper }}: {{ .Values.storage.bucket.secret | b64enc }}
  {{- end }}
  {{- if .Values.vcs.github.privateKey }}
  _APP_VCS_GITHUB_PRIVATE_KEY: {{ .Values.vcs.github.privateKey | b64enc }}
  {{- end }}
  {{- if .Values.vcs.github.webhookSecret }}
  _APP_VCS_GITHUB_WEBHOOK_SECRET: {{ .Values.vcs.github.webhookSecret | b64enc }}
  {{- end }}
  {{- if .Values.vcs.github.clientSecret }}
  _APP_VCS_GITHUB_CLIENT_SECRET: {{ .Values.vcs.github.clientSecret | b64enc }}
  {{- end }}
  {{- if .Values.migrations.firebase.clientId }}
  _APP_MIGRATIONS_FIREBASE_CLIENT_ID: {{ .Values.migrations.firebase.clientId | b64enc }}
  {{- end }}
  {{- if .Values.migrations.firebase.clientSecret }}
  _APP_MIGRATIONS_FIREBASE_CLIENT_SECRET: {{ .Values.migrations.firebase.clientSecret | b64enc }}
  {{- end }}
  {{- if .Values.assistant.openaiApiKey }}
  _APP_ASSISTANT_OPENAI_API_KEY: {{ .Values.assistant.openaiApiKey | b64enc }}
  {{- end }}
