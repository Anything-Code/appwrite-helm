{{- if .Values.console.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "appwrite.fullname" $ }}-console"
  labels:
{{ include "appwrite.labels" $ | indent 4 }}
    app.kubernetes.io/component: console
spec:
  selector:
    matchLabels:
{{ include "appwrite.selectorLabels" $ | indent 6 }}
      app.kubernetes.io/component: console
  replicas: {{ .Values.console.replicaCount }}
  template:
    metadata:
      labels:
{{ include "appwrite.labels" $ | indent 8 }}
        app.kubernetes.io/component: console
    spec:
      containers:
      - name: appwrite-console
        image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}"
        {{- with .Values.console.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
{{ toYaml .Values.console.resources | indent 10 }}
{{- end }}
