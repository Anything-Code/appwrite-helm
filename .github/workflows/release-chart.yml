name: Release Helm Chart

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add dependency repos
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Build dependencies
        run: helm dependency build

      - name: Package and release
        run: |
          VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          TAG="${CHART_NAME}-${VERSION}"

          # Skip if this version is already released
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi

          # Package the chart
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages

          # Install chart-releaser CLI
          CR_VERSION="1.6.1"
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz cr
          chmod +x cr

          # Upload the package as a GitHub Release
          ./cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${GITHUB_REPOSITORY#*/}" \
            --package-path .cr-release-packages \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --skip-existing

          # Ensure gh-pages branch exists
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initial gh-pages"
            git push origin gh-pages
            git switch -
          fi

          # Update the Helm repo index on gh-pages
          mkdir -p .cr-index
          ./cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${GITHUB_REPOSITORY#*/}" \
            --package-path .cr-release-packages \
            --index-path .cr-index/index.yaml \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --push

          # Ensure artifacthub-repo.yml is on gh-pages
          if [ -f artifacthub-repo.yml ]; then
            git stash --include-untracked || true
            git fetch origin gh-pages
            git switch gh-pages
            git checkout master -- artifacthub-repo.yml
            git add artifacthub-repo.yml
            git diff --cached --quiet || git commit -m "Update artifacthub-repo.yml"
            git push origin gh-pages
            git switch -
            git stash pop || true
          fi
